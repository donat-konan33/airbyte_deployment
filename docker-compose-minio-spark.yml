version: '3'
services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"  # API
      - "9002:9001"  # Console
    environment:
      MINIO_ROOT_USER: $MINIO_USER_NAME
      MINIO_ROOT_PASSWORD: $MINIO_USER_PASSWORD
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile-spark
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_STORAGE_USERNAME=$MINIO_USER_NAME
      - SPARK_STORAGE_PASSWORD=$MINIO_USER_PASSWORD
    ports:
      - "8080:8080"  # Spark Master UI
      - "7077:7077"  # RPC
      - "10000:10000"  # Thrift
    command: ["scripts/spark_cluster_entrypoint.sh"]
    volumes:
      - ./jobs:/app/jobs
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - thrift-data:/data
    depends_on:
      - minio

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile-spark
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=$SPARK_MASTER_URL
      - SPARK_WORKER_MEMORY=2G      #<--- adjust accordingly
      - SPARK_WORKER_CORES=2
      - SPARK_STORAGE_USERNAME=$MINIO_USER_NAME
      - SPARK_STORAGE_PASSWORD=$MINIO_USER_PASSWORD
    depends_on:
      - spark-master
    ports:
      - "8081:8081"  # Spark Worker UI
    command: ["scripts/spark_cluster_entrypoint.sh"]
    volumes:
      - ./jobs:/app/jobs
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile-spark
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=SPARK_MASTER_URL
      - SPARK_WORKER_MEMORY=2G      #<--- adjust accordingly
      - SPARK_WORKER_CORES=2
      - SPARK_STORAGE_USERNAME=$MINIO_USER_NAME
      - SPARK_STORAGE_PASSWORD=$MINIO_USER_PASSWORD
    depends_on:
      - spark-master
    ports:
      - "8082:8081"  # Spark Worker UI
    command: ["scripts/spark_cluster_entrypoint.sh"]
    volumes:
      - ./jobs:/app/jobs
      - ./spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf


volumes:
  minio-data:
    external: true # Create this compose external-managed volume  with `docker volume create minio-data`
  thrift-data:
    external: true
